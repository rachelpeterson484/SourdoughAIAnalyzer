stages:
  - build
  - deploy

pages:
  stage: deploy
  image: node:18
  cache:
    paths:
      - node_modules/
  script:
    - npm install
    - npm run build
    - mv public _public
    - mv _public public
  artifacts:
    paths:
      - public
  only:
    - main

build:
  stage: build
  image: node:18
  script:
    - npm install
    - npm run build
  artifacts:
    paths:
      - build
  only:
    - main
